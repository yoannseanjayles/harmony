security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        App\Entity\User: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            entry_point: App\Security\AjaxAwareAuthenticationEntryPoint
            access_denied_handler: App\Security\AjaxAwareAccessDeniedHandler
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                username_parameter: email
                password_parameter: password
                default_target_path: app_dashboard
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                remember_me_parameter: _remember_me
            logout:
                path: app_logout
                target: app_login
                enable_csrf: true
                csrf_token_id: logout
                csrf_parameter: _csrf_token

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/(login|register)$, roles: PUBLIC_ACCESS }
        - { path: ^/logout$, roles: ROLE_USER }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/projects, roles: ROLE_USER }
        - { path: ^/api, roles: ROLE_USER }
        - { path: ^/ai, roles: ROLE_USER }
        - { path: ^/export, roles: ROLE_USER }
        - { path: ^/dashboard, roles: ROLE_USER }
        # T233 — /media/serve/ is protected by HMAC signature, not by session auth.
        - { path: ^/media/serve/, roles: PUBLIC_ACCESS }
        - { path: ^/media, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            App\Entity\User:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
