framework:
    messenger:
        failure_transport: failed

        transports:
            async: '%env(MESSENGER_TRANSPORT_DSN)%'
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            # T230 — Route variant generation to the async transport (sync in dev/test).
            App\Media\Message\GenerateImageVariantsMessage: sync
            # Route chat generation to async transport for non-blocking AI calls.
            App\Chat\Message\GenerateChatReplyMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'sync://'
                sync: 'sync://'
