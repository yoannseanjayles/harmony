framework:
    messenger:
        # Uncomment this (and the failed transport below) to send failed messages to this transport for later handling.
        # failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            # In production replace with: '%env(MESSENGER_TRANSPORT_DSN)%' (e.g. Doctrine or Redis)
            # async: '%env(MESSENGER_TRANSPORT_DSN)%'
            # failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            # T230 — Route variant generation to the async transport (sync in dev/test).
            App\Media\Message\GenerateImageVariantsMessage: sync

when@test:
    framework:
        messenger:
            transports:
                sync: 'sync://'
