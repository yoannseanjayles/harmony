services:
    App\AI\Http\AIHttpClientInterface: '@App\AI\Http\FakeAIHttpClient'
    harmony.ai.http_client.openai: '@App\AI\Http\FakeAIHttpClient'
    harmony.ai.http_client.anthropic: '@App\AI\Http\FakeAIHttpClient'

    # Public aliases for integration tests (HRM-F19 — T158)
    # The test container exposes private services but not inlined/removed ones;
    # these aliases make SlideBuilder and ResponseValidator reachable via getContainer()->get().
    test.slide_builder_alias:
        alias: App\Slide\SlideBuilder
        public: true
    test.response_validator_alias:
        alias: App\AI\ResponseValidator
        public: true

parameters:
    # T216 — Use a smaller upload limit and a temp dir so tests can validate the size
    # limit without hitting PHP's upload_max_filesize (2048 KiB in this environment).
    harmony.media.upload_directory: '%kernel.project_dir%/var/uploads_test'
    harmony.media.max_upload_size_bytes: 5120
