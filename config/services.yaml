# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    harmony.project_versions.max_keep: 10
    harmony.project_share.ttl_seconds: 604800
    # T212 — Maximum upload size in bytes (default 10 MiB).  Override via HARMONY_UPLOAD_MAX_SIZE.
    harmony.media.upload_directory: '%kernel.project_dir%/public/uploads/media'
    harmony.media.max_upload_size_bytes: 10485760
    # HTTP timeout (seconds) for OpenAI API requests — covers p99 latency at 30 s
    harmony.ai.timeout.openai: 30.0
    # HTTP timeout (seconds) for Anthropic API requests — Claude models may take longer; 60 s covers p99 latency
    harmony.ai.timeout.anthropic: 60.0
    # T160 — Slide render cache versioning: increment these when Twig templates or static assets change.
    harmony.slide_cache.template_version: '1'
    harmony.slide_cache.assets_version: ''

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Project\ProjectVersioning:
        arguments:
            $maxVersionsPerProject: '%harmony.project_versions.max_keep%'

    App\Project\ProjectShareLinkGenerator:
        arguments:
            $ttlSeconds: '%harmony.project_share.ttl_seconds%'

    # T160 — SlideRenderHashCalculator: version parameters allow cache invalidation when templates/assets change.
    App\Slide\SlideRenderHashCalculator:
        arguments:
            $templateVersion: '%harmony.slide_cache.template_version%'
            $assetsVersion: '%harmony.slide_cache.assets_version%'

    # Per-provider HTTP clients with explicit, documented timeout values (see parameters above)
    harmony.ai.http_client.openai:
        class: App\AI\Http\NativeAIHttpClient
        arguments: ['%harmony.ai.timeout.openai%']

    harmony.ai.http_client.anthropic:
        class: App\AI\Http\NativeAIHttpClient
        arguments: ['%harmony.ai.timeout.anthropic%']

    App\AI\ProviderFactory:
        arguments:
            $openAiHttpClient: '@harmony.ai.http_client.openai'
            $anthropicHttpClient: '@harmony.ai.http_client.anthropic'

    # T209 / T210 / T212 / T213 — Media upload service wiring.
    App\Media\MediaUploadService:
        arguments:
            $uploadDirectory: '%harmony.media.upload_directory%'
            $maxUploadSizeBytes: '%harmony.media.max_upload_size_bytes%'

    # T213 — Default to no-op scanner; replace with a real implementation when ClamAV is available.
    App\Media\AntivirusScannerInterface:
        alias: App\Media\NoOpAntivirusScanner
