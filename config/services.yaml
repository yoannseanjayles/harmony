# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    harmony.project_versions.max_keep: 10
    harmony.project_share.ttl_seconds: 604800
    # T212 — Maximum upload size in bytes (default 10 MiB).  Override via HARMONY_UPLOAD_MAX_SIZE.
    harmony.media.upload_directory: '%kernel.project_dir%/public/uploads/media'
    harmony.media.max_upload_size_bytes: 10485760
    # T217–T220 — Storage adapter selection. Set APP_STORAGE_DRIVER=s3 in production.
    harmony.storage.driver: '%env(APP_STORAGE_DRIVER)%'
    # T233 — HMAC secret for local signed URLs. Leave empty to fall back to plain public paths (dev).
    harmony.media.signed_url_secret: '%env(HARMONY_MEDIA_SIGNED_URL_SECRET)%'
    # T233/T238 — Default TTL (seconds) for signed media URLs.
    harmony.media.signed_url_ttl: 3600
    # HTTP timeout (seconds) for OpenAI API requests — covers p99 latency at 30 s
    harmony.ai.timeout.openai: 30.0
    # HTTP timeout (seconds) for Anthropic API requests — Claude models may take longer; 60 s covers p99 latency
    harmony.ai.timeout.anthropic: 60.0
    # T160 — Slide render cache versioning: increment these when Twig templates or static assets change.
    harmony.slide_cache.template_version: '1'
    harmony.slide_cache.assets_version: ''
    # HRM-T344 — Configurable AI error-rate alert threshold (0.0–1.0). Default 0.5 = 50 %.
    harmony.ops.ai_error_rate_threshold: 0.5

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Project\ProjectVersioning:
        arguments:
            $maxVersionsPerProject: '%harmony.project_versions.max_keep%'

    App\Project\ProjectShareLinkGenerator:
        arguments:
            $ttlSeconds: '%harmony.project_share.ttl_seconds%'

    # T160 — SlideRenderHashCalculator: version parameters allow cache invalidation when templates/assets change.
    App\Slide\SlideRenderHashCalculator:
        arguments:
            $templateVersion: '%harmony.slide_cache.template_version%'
            $assetsVersion: '%harmony.slide_cache.assets_version%'

    # Per-provider HTTP clients with explicit, documented timeout values (see parameters above)
    harmony.ai.http_client.openai:
        class: App\AI\Http\NativeAIHttpClient
        arguments: ['%harmony.ai.timeout.openai%']

    harmony.ai.http_client.anthropic:
        class: App\AI\Http\NativeAIHttpClient
        arguments: ['%harmony.ai.timeout.anthropic%']

    App\AI\ProviderFactory:
        arguments:
            $openAiHttpClient: '@harmony.ai.http_client.openai'
            $anthropicHttpClient: '@harmony.ai.http_client.anthropic'

    # T209 / T210 / T212 / T213 / T230 — Media upload service wiring.
    App\Media\MediaUploadService:
        arguments:
            $maxUploadSizeBytes: '%harmony.media.max_upload_size_bytes%'

    # T237 — MediaUrlResolver: resolves "media:{id}" references to signed URLs at render time.
    App\Media\MediaUrlResolver:
        arguments:
            $signedUrlTtlSeconds: '%harmony.media.signed_url_ttl%'

    # T213 — Default to no-op scanner; replace with a real implementation when ClamAV is available.
    App\Media\AntivirusScannerInterface:
        alias: App\Media\NoOpAntivirusScanner

    # T217–T220 — Storage adapter wiring.
    App\Storage\LocalStorageAdapter:
        arguments:
            $uploadDirectory: '%harmony.media.upload_directory%'
            $hmacSecret: '%harmony.media.signed_url_secret%'

    App\Storage\NativeS3Client:
        arguments:
            $accessKeyId: '%env(HARMONY_S3_ACCESS_KEY_ID)%'
            $secretAccessKey: '%env(HARMONY_S3_SECRET_ACCESS_KEY)%'
            $region: '%env(HARMONY_S3_REGION)%'
            $endpoint: '%env(HARMONY_S3_ENDPOINT)%'

    App\Storage\S3StorageAdapter:
        arguments:
            $bucket: '%env(HARMONY_S3_BUCKET)%'

    App\Storage\StorageAdapterFactory:
        arguments:
            $driver: '%harmony.storage.driver%'

    # T220 — The active adapter is resolved at boot time by StorageAdapterFactory.
    App\Storage\StorageAdapterInterface:
        factory: ['@App\Storage\StorageAdapterFactory', 'create']

    # HRM-T344 — OpsLogger: configurable AI error-rate threshold.
    App\Ops\OpsLogger:
        arguments:
            $aiErrorRateThreshold: '%harmony.ops.ai_error_rate_threshold%'
